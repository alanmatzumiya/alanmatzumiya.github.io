<div class="container">
	
<h3 style="text-align: left;"> 
	My first website and CV written in LaTex.
</h3>
	<button onclick="webframe()">CV website</button>
	<button id="pdf">CV PDF</button>
	<button onclick="closeDoc()">Close</button>
<div id="adobe-dc-view" style="height: 600px;"></div>
</div>
<script src="https://documentcloud.adobe.com/view-sdk/main.js"></script>
<script>
function webframe() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  document.getElementById("adobe-dc-view").innerHTML = "<iframe allowfullscreen='allowfullscreen' style='width: 100%; height: 100%; border: none;' title='inline-website-frame' src='https://alanmatzumiya.github.io/old-website/'></iframe>";
  }
	
function closeDoc() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  }	
</script>
<script type="text/javascript">
(function() {
	var updateButton = document.getElementById('pdf');
	updateButton.addEventListener("click", function()
       {
	   document.getElementById("adobe-dc-view").innerHTML = "";
	   var adobeDCView = new AdobeDC.View({clientId: "b37b8b60bc344c63a5d92b6679b6e786", divId: "adobe-dc-view"});
	   adobeDCView.previewFile(
	  {
	     content:   {location: {url: "assets/images/resume/CV.pdf"}},
	     metaData: {fileName: "CV.pdf"}
	  });
       });	
       })();
</script>
