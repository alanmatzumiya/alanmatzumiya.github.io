<div class="container" style="overflow: hidden; border: 1px solid #ccc; background-color: #f1f1f1;">
	<button onclick="webframe()" style="float: left;">CV website</button>
	<button id="pdf" style="float: left;">CV PDF</button>
	<button onclick="closeDoc()" style="float: right;">Close</button>
</div>

<div id="adobe-dc-view" style="height: 600px;"></div>

<h1>My Web Page</h1>
<div id="piechart"></div>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="text/javascript">
// Load google charts
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(drawChart);

// Draw the chart and set the chart values
function drawChart() {
  var data = google.visualization.arrayToDataTable([
  ['Task', 'Hours per Day'],
  ['Work', 8],
  ['Eat', 2],
  ['TV', 4],
  ['Gym', 2],
  ['Sleep', 8]
]);

  // Optional; add a title and set the width and height of the chart
  var options = {'title':'My Average Day', 'width':550, 'height':400};

  // Display the chart inside the <div> element with id="piechart"
  var chart = new google.visualization.PieChart(document.getElementById('piechart'));
  chart.draw(data, options);
}
</script>	
<script src="https://documentcloud.adobe.com/view-sdk/main.js"></script>
<script>
function webframe() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  document.getElementById("adobe-dc-view").innerHTML = "<iframe allowfullscreen='allowfullscreen' style='width: 100%; height: 100%; border: none;' title='inline-website-frame' src='https://alanmatzumiya.github.io/old-website/'></iframe>";
  }
	
function closeDoc() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  }	
</script>
<script type="text/javascript">
(function() {
	var updateButton = document.getElementById('pdf');
	updateButton.addEventListener("click", function()
       {
	   document.getElementById("adobe-dc-view").innerHTML = "";
	   var adobeDCView = new AdobeDC.View({clientId: "b37b8b60bc344c63a5d92b6679b6e786", divId: "adobe-dc-view"});
	   adobeDCView.previewFile(
	  {
	     content:   {location: {url: "assets/images/resume/CV.pdf"}},
	     metaData: {fileName: "CV.pdf"}
	  });
       });	
       })();
</script>
