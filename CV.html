<!-- <div class="6u 12u$(xsmall)"> <div class="6u$ 12u$(xsmall)">  <div class="4u 12u$(small)"> -->
<div class="12u$" style="overflow: hidden; border: 1px solid #ccc; background-color: #f1f1f1;">
	<div class="select-wrapper">
	<button class="4u" onclick="closeDoc()" style="float: left;">Close</button>
	<button class="4u" onclick="webframe()" style="float: right;">CV website</button>
	<button id="pdf" class="4u$" style="float: right;">CV PDF</button>
	</div>	
</div>

<div id="adobe-dc-view" style="height: 600px;"></div>
	
<script src="https://documentcloud.adobe.com/view-sdk/main.js"></script>
<script>
function webframe() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  document.getElementById("adobe-dc-view").innerHTML = "<iframe allowfullscreen='allowfullscreen' style='width: 100%; height: 100%; border: none;' title='inline-website-frame' src='https://nbtest.herokuapp.com'></iframe>";
  }
	
function closeDoc() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  }	
</script>
<script type="text/javascript">
(function() {
	var updateButton = document.getElementById('pdf');
	updateButton.addEventListener("click", function()
       {
	   document.getElementById("adobe-dc-view").innerHTML = "";
	   var adobeDCView = new AdobeDC.View({clientId: "b37b8b60bc344c63a5d92b6679b6e786", divId: "adobe-dc-view"});
	   adobeDCView.previewFile(
	  {
	     content:   {location: {url: "assets/images/resume/CV.pdf"}},
	     metaData: {fileName: "CV.pdf"}
	  });
       });	
       })();
</script>
