	<p><button onclick="webframe()">Show website as Iframe</button>  <button id="pdf">Show CV as PDF</button>  <button onclick="closeDocs()">Close All</button></p>

	<div id="website-frame"></div>
	<div id="adobe-dc-view" style="height: 800px;"></div>

<script>
function webframe() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  document.getElementById("website-frame").innerHTML = "<iframe title='inline-website-frame' width='500' height='800' src='https://alanmatzumiya.github.io/old-website/'></iframe>";
  }
	
function closeDocs() {
  document.getElementById("adobe-dc-view").innerHTML = "";
  document.getElementById("website-frame").innerHTML = "";
  }	
</script>
<script src="https://documentcloud.adobe.com/view-sdk/main.js" type="text/javascript">
(function() {
	var updateButton = document.getElementById('pdf');
	updateButton.addEventListener("click", function()
       {
	   document.getElementById("website-frame").innerHTML = "";
	   var adobeDCView = new AdobeDC.View({clientId: "b37b8b60bc344c63a5d92b6679b6e786", divId: "adobe-dc-view"});
	   adobeDCView.previewFile(
	  {
	     content:   {location: {url: "assets/images/resume/CV.pdf"}},
	     metaData: {fileName: "CV.pdf"}
	  });
       });	
       })();
</script>
