---
title: Contact
cover-photo: linear-gradient(rgba(0, 0, 0, 0.5), rgba(35, 36, 39, 0.95))
cover-photo-alt: cover photo
icon: fa-envelope
order: 5
---
<form method="post" action="https://formspree.io/{{ site.email }}">
	<div class="row uniform">
		<div class="6u 12u$(xsmall)">
			<input type="text" name="name" id="name" value="" placeholder="Name" />
		</div>
		<div class="6u$ 12u$(xsmall)">
			<input type="email" name="email" id="email" value="" placeholder="Email" />
		</div>
		<!-- Break -->
		<div class="12u$">
			<div class="select-wrapper">
				<select name="category" id="category">
					<option value="">- Category -</option>
					<option value="1">Query</option>
					<option value="2">Business</option>
					<option value="3">Human Resources</option>
				</select>
			</div>
		</div>
		<!-- Break -->
		<div class="4u 12u$(small)"><label for="priority-low"> Low <input type="radio" id="priority-low" name="priority" checked></label>
		</div>
		<div class="4u 12u$(small)"><label for="priority-normal"> Normal <input type="radio" id="priority-normal" name="priority"></label>
		</div>
		<div class="4u$ 12u$(small)"><label for="priority-high"> High <input type="radio" id="priority-high" name="priority"></label>
		</div>
		<!-- Break -->
		<div class="6u 12u$(small)"><label for="copy"> Email me a copy <input type="checkbox" id="copy" name="copy"></label>
		</div>
		<div class="6u$ 12u$(small)"><label for="human"> I am a human <input type="checkbox" id="human" name="human" checked></label>
		</div>
		<!-- Break -->
		<div class="12u$">
			<textarea name="message" id="message" placeholder="Enter your message" rows="6"></textarea>
		</div>
		<!-- Break -->
		<div class="12u$">
			<div class="actions">
				<input type="submit" value="Send Message" class="special" />
			</div>
		</div>
	</div>
</form>
