---
title: Contact
cover-photo: assets/images/pic08.jpg
cover-photo-alt: example cover photo
icon: fa-envelope
order: 5
---
<form method="post" action="https://formspree.io/{{ site.email }}">
	<div class="row uniform">
		<div class="6u 12u$(xsmall)">
			<input type="text" name="demo-name" id="demo-name" value="" placeholder="Name" />
		</div>
		<div class="6u$ 12u$(xsmall)">
			<input type="email" name="demo-email" id="demo-email" value="" placeholder="Email" />
		</div>
		<!-- Break -->
		<div class="12u$">
			<div class="select-wrapper">
				<select name="demo-category" id="demo-category">
					<option value="">- Category -</option>
					<option value="1">Manufacturing</option>
					<option value="1">Shipping</option>
					<option value="1">Administration</option>
					<option value="1">Human Resources</option>
				</select>
			</div>
		</div>
		<!-- Break -->
		<div class="4u 12u$(small)">
			<label for="demo-priority-low">   Low   <input type="radio" id="demo-priority-low" name="demo-priority" checked></label>
		</div>
		<div class="4u 12u$(small)">
			<label for="demo-priority-normal">   Normal   <input type="radio" id="demo-priority-normal" name="demo-priority"></label>
		</div>
		<div class="4u$ 12u$(small)">
			<label for="demo-priority-high">   High   <input type="radio" id="demo-priority-high" name="demo-priority"></label>
		</div>
		<!-- Break -->
		<div class="3u 12u$(small)">
			<label for="demo-copy">   Email me a copy   <input type="checkbox" id="demo-copy" name="demo-copy"></label>
		</div>
		<div class="3u$ 12u$(small)">
			<label for="demo-human">   I am a human   <input type="checkbox" id="demo-human" name="demo-human" checked></label>
		</div>
		<!-- Break -->
		<div class="12u$">
			<textarea name="demo-message" id="demo-message" placeholder="Enter your message" rows="6"></textarea>
		</div>
		<!-- Break -->
		<div class="12u$">
			<div class="actions">
				<input type="submit" value="Send Message" class="special" />
				<input type="reset" value="Reset" />
			</div>
		</div>
	</div>
</form>
